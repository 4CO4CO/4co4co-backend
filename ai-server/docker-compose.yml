services:
  ai-server:
    container_name: ai-server
    build:
      context: .
      dockerfile: Dockerfile
      args:
        USE_GPU: true
        BASE_IMAGE: pytorch/pytorch:2.1.0-cuda11.8-cudnn8-runtime
    env_file:
      - .env
    ports:
      - "8001:8001"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

