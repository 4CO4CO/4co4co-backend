services:
  redis:
    image: redis:alpine
    container_name: redis
    ports:
      - "6379:6379"

  mongo:
    image: mongo:latest
    container_name: mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE}
    volumes:
      - mongo_data:/data/db

  backend:
    build: .
    container_name: backend
    command: >
      poetry run uvicorn app.main:app
      --host 0.0.0.0
      --port ${BACKEND_PORT:-8000}
      --workers 1
      --loop asyncio
      --http h11
      --timeout-keep-alive 30
    volumes:
      - .:/app
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      - redis
      - mongo
    env_file:
      - .env

  celery:
    build: .
    container_name: celery
    command: >
      poetry run celery -A app.core.celery_app worker
      --loglevel=info
      --concurrency=${CELERY_CONCURRENCY:-1}
      --pool=prefork
      --prefetch-multiplier=1
      -Q celery
      -n worker@%h
    volumes:
      - .:/app
    depends_on:
      - redis
      - mongo
    env_file:
      - .env

volumes:
  mongo_data: