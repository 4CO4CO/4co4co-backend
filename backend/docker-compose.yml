version: "3.8"

services:
  redis:
    image: redis:latest
    ports:
      - "6379:6379"

  mongo:
    image: mongo:latest
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: your-db-name

  backend:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - redis
      - mongo

  celery:
    build: .
    command: celery -A app.core.celery_app.celery_app worker --loglevel=info --pool=solo
    volumes:
      - .:/app
    depends_on:
      - redis
      - mongo
